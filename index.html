<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste API Livros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 0 16px;
      background: #f5f5f5;
    }

    h1 {
      color: #222;
    }

    .campo {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin: 6px 6px 6px 0;
      padding: 10px 14px;
      border: 0;
      border-radius: 4px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    pre {
      background: #222;
      color: #f8f8f8;
      padding: 16px;
      border-radius: 4px;
      overflow-x: auto;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <h1>API de Livros</h1>

  <div class="campo">
    <label for="id">ID do livro</label>
    <input type="number" id="id" placeholder="Use para atualizar ou deletar">
  </div>

  <div class="campo">
    <label for="titulo">Título</label>
    <input type="text" id="titulo" placeholder="Ex: Dom Casmurro">
  </div>

  <div class="campo">
    <label for="autor">Autor</label>
    <input type="text" id="autor" placeholder="Ex: Machado de Assis">
  </div>

  <div class="campo">
    <label for="pagina">Páginas</label>
    <input type="number" id="pagina" placeholder="Ex: 256">
  </div>

  <button onclick="listarLivros()">GET /livros</button>
  <button onclick="adicionarLivro()">POST /livros</button>
  <button onclick="atualizarLivro()">PUT /livros/{id}</button>
  <button onclick="deletarLivro()">DELETE /livros/{id}</button>

  <h2>Resposta da API</h2>
  <pre id="resposta">Clique em um botão para fazer uma requisição.</pre>

  <script>
    const API_URL = "http://127.0.0.1:8000";

    function pegarDadosDoFormulario() {
      return {
        titulo: document.getElementById("titulo").value,
        autor: document.getElementById("autor").value,
        pagina: Number(document.getElementById("pagina").value)
      };
    }

    function pegarId() {
      return document.getElementById("id").value;
    }

    function mostrarResposta(dados) {
      document.getElementById("resposta").textContent = JSON.stringify(dados, null, 2);
    }





    //Falar aqui na aula




    async function listarLivros() {
      const resposta = await fetch(API_URL + "/livros");
      const dados = await resposta.json();

      mostrarResposta(dados);
    }






    async function adicionarLivro() {
      const livro = pegarDadosDoFormulario();

      const resposta = await fetch(API_URL + "/livros", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(livro)
      });

      const dados = await resposta.json();
      mostrarResposta(dados);
    }





    async function atualizarLivro() {
      const id = pegarId();
      const livro = pegarDadosDoFormulario();

      const resposta = await fetch(API_URL + "/livros/" + id, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(livro)
      });

      const dados = await resposta.json();
      mostrarResposta(dados);
    }






    async function deletarLivro() {
      const id = pegarId();

      const resposta = await fetch(API_URL + "/livros/" + id, {
        method: "DELETE"
      });

      const dados = await resposta.json();
      mostrarResposta(dados);
    }
  </script>
</body>
</html>
